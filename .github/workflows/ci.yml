name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore RuleKit.slnx --locked-mode

      - name: Verify formatting
        run: dotnet format RuleKit.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build RuleKit.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test RuleKit.slnx --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/RuleKit/RuleKit.csproj --configuration Release --no-build --output artifacts

      - name: Upload packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rulekit-packages
          path: artifacts/*.*nupkg
          if-no-files-found: error
          retention-days: 7
