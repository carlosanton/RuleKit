name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore RuleKit.slnx --locked-mode

      - name: Verify formatting
        run: dotnet format RuleKit.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build RuleKit.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test RuleKit.slnx --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/RuleKit/RuleKit.csproj --configuration Release --no-build --output artifacts

      - name: Upload packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rulekit-packages
          path: artifacts/*.*nupkg
          if-no-files-found: error
          retention-days: 7
