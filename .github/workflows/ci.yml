name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore RuleKit.slnx

      - name: Verify formatting
        run: dotnet format RuleKit.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build RuleKit.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test RuleKit.slnx --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/RuleKit/RuleKit.csproj --configuration Release --no-build --output artifacts

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: rulekit-packages
          path: artifacts/*.*nupkg
          if-no-files-found: error
